name: Build and Run Cellular Automaton

on:
  workflow_dispatch:   # manual trigger only

jobs:
  build-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc
          sudo apt-get install -y imagemagick libpng-dev

      - name: Build main.c
        run: |
          gcc -O2 -std=c11 -Wall -Wextra -o main main.c

      - name: Create output directory
        run: mkdir -p out


      - name: Run program (unbuffered output)
        run: |
          echo "=== Program start ==="
          stdbuf -oL -eL ./main
          echo "=== Program end ==="

      - name: Convert BMP to PNG
        run: |
          mkdir -p out_png
          for f in out/*.bmp; do
            [ -e "$f" ] || continue
            convert "$f" "out_png/$(basename "${f%.bmp}.png")"
          done

      - name: Upload output images
        uses: actions/upload-artifact@v4
        with:
          name: automaton-output
          path: out_png/